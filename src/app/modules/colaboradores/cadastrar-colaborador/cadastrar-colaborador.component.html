<h2>Cadastro de Colaborador</h2>

<form [formGroup]="form" (ngSubmit)="cadastrar()">
  <mat-form-field appearance="fill" class="full-width">
    <mat-label>Nome</mat-label>
    <input matInput formControlName="nome" required>
    <mat-error *ngIf="form.get('nome')?.invalid">Nome é obrigatório.</mat-error>
  </mat-form-field>

  <mat-form-field appearance="fill" class="full-width">
    <mat-label>CPF</mat-label>
    <input matInput formControlName="cpf" required>
    <mat-error *ngIf="form.get('cpf')?.invalid">CPF inválido (11 dígitos).</mat-error>
  </mat-form-field>

  <button mat-raised-button color="primary" type="submit" [disabled]="form.invalid">
    Cadastrar
  </button>
</form>
