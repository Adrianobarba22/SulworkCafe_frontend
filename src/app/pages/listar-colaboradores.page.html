<div class="page-container">
  <h2>Colaboradores</h2>

  <table>
    <thead>
      <tr>
        <th>Nome</th>
        <th>CPF</th>
        <th>Ações</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let colaborador of colaboradores">
        <td>{{ colaborador.nome }}</td>
        <td>{{ colaborador.cpf }}</td>
        <td>
          <button class="btn small">Editar</button>
          <button class="btn small danger">Excluir</button>
        </td>
      </tr>
    </tbody>
  </table>
</div>
